services:
  - type: web
    name: parce-api
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: parce-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: parce-redis
          type: redis
          property: connectionString
    healthCheckPath: /health

  - type: web
    name: parce-owner-app
    runtime: static
    rootDir: apps/owner-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: parce-customer-app
    runtime: static
    rootDir: apps/customer-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: parce-db
    databaseName: parce
    plan: free

  - name: parce-redis
    plan: free
